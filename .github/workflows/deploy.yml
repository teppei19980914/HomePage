name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 社会人歴の更新（毎年4月1日 0:00 JST = 3月31日 15:00 UTC）
    - cron: "0 15 31 3 *"
    # 年齢の更新（毎年9月15日 0:00 JST = 9月14日 15:00 UTC）
    - cron: "0 15 14 9 *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
